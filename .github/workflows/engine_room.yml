name: Quantitative Engine Room Maintenance

on:
  schedule:
    - cron: '0 23 * * *' # Midnight Grading runs every day at 23:00 UTC
    - cron: '0 6 * * 0'  # Drift Analyzer runs every Sunday at 06:00 UTC
  workflow_dispatch:     # Allows manual triggering

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy supabase python-dotenv

      - name: Run Midnight Grader (Daily)
        if: github.event.schedule == '0 23 * * *' || github.event_name == 'workflow_dispatch'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python backend/scripts/grade_ledger.py

      - name: Run Statistical Drift Analyzer (Sundays)
        if: github.event.schedule == '0 6 * * 0' || github.event_name == 'workflow_dispatch'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python backend/scripts/analyze_drift.py